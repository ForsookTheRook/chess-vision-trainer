<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Chess Vision Trainer</title>

<style>

body {

  display: flex;

  flex-direction: column;

  align-items: center;

  font-family: Arial, sans-serif;

}

#controls {

  display: flex;

  gap: 10px;

  margin-bottom: 10px;

}

#stats {

  margin-bottom: 10px;

  font-size: 16px;

}

#target {

  margin-bottom: 10px;

  font-size: 22px;

  font-weight: bold;

}

#board {

  display: grid;

  grid-template-columns: repeat(8, 60px);

  grid-template-rows: repeat(8, 60px);

}

.square {

  width: 60px;

  height: 60px;

  position: relative;

}

.light { background: #f0d9b5; }

.dark  { background: #b58863; }

.target::after {

  content: "";

  position: absolute;

  width: 18px;

  height: 18px;

  border: 2px solid red;

  border-radius: 4px;

  top: 50%;

  left: 50%;

  transform: translate(-50%, -50%);

}

.correct::after {

  content: "✔";

  color: green;

  font-size: 28px;

  position: absolute;

  top: 50%;

  left: 50%;

  transform: translate(-50%, -50%);

}

.incorrect::after {

  content: "✖";

  color: red;

  font-size: 28px;

  position: absolute;

  top: 50%;

  left: 50%;

  transform: translate(-50%, -50%);

}

.coord-file {

  position: absolute;

  bottom: 2px;

  right: 4px;

  font-size: 10px;

  opacity: 0.75;

}

.coord-rank {

  position: absolute;

  top: 2px;

  left: 4px;

  font-size: 10px;

  opacity: 0.75;

}

.hidden { display: none; }

</style>

</head>

<body>

<div id="controls">

  <button onclick="toggleCoords()" id="coordsBtn">Show Coordinates</button>

  <button onclick="toggleSide()" id="sideBtn">Play as Black</button>

  <button onclick="toggleMode()" id="modeBtn">30 Sec Mode</button>

</div>

<div id="stats">

  Correct: <span id="correct">0</span> |

  Attempts: <span id="attempts">0</span> |

  Best: <span id="best">0</span>

</div>

<div id="target"></div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

let showCoords = false;

let playAsBlack = false;

let timedMode = true;

let correct = 0;

let attempts = 0;

let best = 0;

let timer = null;

let timeLeft = 30;

let locked = false;

const filesWhite = ["a","b","c","d","e","f","g","h"];

const ranksWhite = [8,7,6,5,4,3,2,1];

function getFiles() {

  return playAsBlack ? [...filesWhite].reverse() : filesWhite;

}

function getRanks() {

  return playAsBlack ? [...ranksWhite].reverse() : ranksWhite;

}

let targetSquare = null;

function getRandomSquare() {

  return {

    f: Math.floor(Math.random() * 8),

    r: Math.floor(Math.random() * 8)

  };

}

function squareName(sq) {

  return filesWhite[sq.f] + ranksWhite[sq.r];

}

function updateStats() {

  document.getElementById("correct").textContent = correct;

  document.getElementById("attempts").textContent = attempts;

  document.getElementById("best").textContent = best;

}

function updateTarget() {

  document.getElementById("target").textContent =

    "Find: " + squareName(targetSquare);

}

function startTimer() {

  clearInterval(timer);

  timeLeft = 30;

  timer = setInterval(() => {

    timeLeft--;

    document.getElementById("modeBtn").textContent =

      `Time: ${timeLeft}s`;

    if (timeLeft <= 0) {

      clearInterval(timer);

      best = Math.max(best, correct);

      correct = 0;

      attempts = 0;

      updateStats();

      nextRound();

      startTimer();

    }

  }, 1000);

}

function createBoard() {

  board.innerHTML = "";

  const files = getFiles();

  const ranks = getRanks();

  for (let r = 0; r < 8; r++) {

    for (let f = 0; f < 8; f++) {

      const square = document.createElement("div");

      square.classList.add("square");

      if ((r + f) % 2 === 0) {

        square.classList.add("light");

      } else {

        square.classList.add("dark");

      }

      let actualF = playAsBlack ? 7 - f : f;

      let actualR = playAsBlack ? 7 - r : r;

      if (targetSquare.f === actualF && targetSquare.r === actualR) {

        square.classList.add("target");

      }

      square.addEventListener("click", () => {

        if (locked) return;

        locked = true;

        attempts++;

        const isCorrect =

          targetSquare.f === actualF &&

          targetSquare.r === actualR;

        if (isCorrect) {

          correct++;

          square.classList.add("correct");

        } else {

          square.classList.add("incorrect");

        }

        updateStats();

        setTimeout(() => {

          locked = false;

          nextRound();

        }, 500);

      });

      const file = files[f];

      const rank = ranks[r];

      if (r === 7) {

        const fileLabel = document.createElement("div");

        fileLabel.textContent = file;

        fileLabel.classList.add("coord-file");

        if (!showCoords) fileLabel.classList.add("hidden");

        square.appendChild(fileLabel);

      }

      if (f === 0) {

        const rankLabel = document.createElement("div");

        rankLabel.textContent = rank;

        rankLabel.classList.add("coord-rank");

        if (!showCoords) rankLabel.classList.add("hidden");

        square.appendChild(rankLabel);

      }

      board.appendChild(square);

    }

  }

}

function nextRound() {

  targetSquare = getRandomSquare();

  updateTarget();

  createBoard();

}

function toggleCoords() {

  showCoords = !showCoords;

  document.getElementById("coordsBtn").textContent =

    showCoords ? "Hide Coordinates" : "Show Coordinates";

  createBoard();

}

function toggleSide() {

  playAsBlack = !playAsBlack;

  document.getElementById("sideBtn").textContent =

    playAsBlack ? "Play as White" : "Play as Black";

  createBoard();

}

function toggleMode() {

  timedMode = !timedMode;

  if (timedMode) {

    startTimer();

  } else {

    clearInterval(timer);

    document.getElementById("modeBtn").textContent = "Unlimited Mode";

  }

}

// Init

nextRound();

updateStats();

startTimer();

</script>

</body>

</html>
