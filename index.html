<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Chess Trainer</title>

<style>

  body {

    display: flex;

    flex-direction: column;

    align-items: center;

    font-family: Arial, sans-serif;

  }

  #controls {

    margin-bottom: 10px;

    display: flex;

    gap: 10px;

  }

  button {

    padding: 6px 12px;

    font-size: 14px;

    cursor: pointer;

  }

  #board {

    display: grid;

    grid-template-columns: repeat(8, 60px);

    grid-template-rows: repeat(8, 60px);

  }

  .square {

    width: 60px;

    height: 60px;

    position: relative;

  }

  .light { background: #f0d9b5; }

  .dark  { background: #b58863; }

  /* Target marker */

  .target::after {

    content: "";

    position: absolute;

    width: 18px;

    height: 18px;

    border: 2px solid red;

    border-radius: 4px;

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

  }

  /* Feedback icons */

  .correct::after {

    content: "✔";

    color: green;

    font-size: 28px;

    position: absolute;

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

  }

  .incorrect::after {

    content: "✖";

    color: red;

    font-size: 28px;

    position: absolute;

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

  }

  /* Coordinates */

  .coord-file {

    position: absolute;

    bottom: 2px;

    right: 4px;

    font-size: 10px;

    opacity: 0.75;

  }

  .coord-rank {

    position: absolute;

    top: 2px;

    left: 4px;

    font-size: 10px;

    opacity: 0.75;

  }

  .hidden {

    display: none;

  }

</style>

</head>

<body>

<div id="controls">

  <button id="coordsBtn" onclick="toggleCoords()">Show Coordinates</button>

  <button id="sideBtn" onclick="toggleSide()">Play as Black</button>

</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

let showCoords = false;

let playAsBlack = false;

let targetSquare = null;

let locked = false;

// Base coordinates

const filesWhite = ["a","b","c","d","e","f","g","h"];

const ranksWhite = [8,7,6,5,4,3,2,1];

function getFiles() {

  return playAsBlack ? [...filesWhite].reverse() : filesWhite;

}

function getRanks() {

  return playAsBlack ? [...ranksWhite].reverse() : ranksWhite;

}

function getRandomSquare() {

  return {

    f: Math.floor(Math.random() * 8),

    r: Math.floor(Math.random() * 8)

  };

}

function createBoard() {

  board.innerHTML = "";

  const files = getFiles();

  const ranks = getRanks();

  for (let r = 0; r < 8; r++) {

    for (let f = 0; f < 8; f++) {

      const square = document.createElement("div");

      square.classList.add("square");

      // Color

      if ((r + f) % 2 === 0) {

        square.classList.add("light");

      } else {

        square.classList.add("dark");

      }

      // Map visual → actual

      let actualF = playAsBlack ? 7 - f : f;

      let actualR = playAsBlack ? 7 - r : r;

      // Target marker

      if (targetSquare && targetSquare.f === actualF && targetSquare.r === actualR) {

        square.classList.add("target");

      }

      // Click handling

      square.addEventListener("click", () => {

        if (locked) return;

        locked = true;

        const correct =

          targetSquare.f === actualF &&

          targetSquare.r === actualR;

        if (correct) {

          square.classList.add("correct");

        } else {

          square.classList.add("incorrect");

        }

        // Show result briefly then next

        setTimeout(() => {

          targetSquare = getRandomSquare();

          locked = false;

          createBoard();

        }, 600);

      });

      const file = files[f];

      const rank = ranks[r];

      // File labels

      if (r === 7) {

        const fileLabel = document.createElement("div");

        fileLabel.textContent = file;

        fileLabel.classList.add("coord-file");

        if (!showCoords) fileLabel.classList.add("hidden");

        square.appendChild(fileLabel);

      }

      // Rank labels

      if (f === 0) {

        const rankLabel = document.createElement("div");

        rankLabel.textContent = rank;

        rankLabel.classList.add("coord-rank");

        if (!showCoords) rankLabel.classList.add("hidden");

        square.appendChild(rankLabel);

      }

      board.appendChild(square);

    }

  }

}

function toggleCoords() {

  showCoords = !showCoords;

  document.getElementById("coordsBtn").textContent =

    showCoords ? "Hide Coordinates" : "Show Coordinates";

  createBoard();

}

function toggleSide() {

  playAsBlack = !playAsBlack;

  document.getElementById("sideBtn").textContent =

    playAsBlack ? "Play as White" : "Play as Black";

  createBoard();

}

// Initialize

targetSquare = getRandomSquare();

createBoard();

</script>

</body>

</html>
