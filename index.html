<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin:0;

    background:#111;

    display:flex;

    flex-direction:column;

    align-items:center;

    font-family: -apple-system, sans-serif;

}

.top-controls {

    margin-top:15px;

    color:white;

    font-size:14px;

    display:flex;

    gap:10px;

    align-items:center;

}

button {

    padding:6px 10px;

    border-radius:6px;

    border:none;

    background:#2c2c2e;

    color:white;

}

.board {

    display:grid;

    grid-template-columns: repeat(8, 40px);

    grid-template-rows: repeat(8, 40px);

    margin-top:15px;

}

.square {

    width:40px;

    height:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:10px;

    user-select:none;

}

.light { background:#f0d9b5; }

.dark { background:#b58863; }

.selected {

    box-shadow: inset 0 0 0 3px #00e5ff;

}

.controls-bottom {

    margin-top:15px;

    color:white;

    font-size:14px;

}

.flash {

    position: fixed;

    top: 12%;

    right: 10%;

    font-size: 56px;

    font-weight: 300;

    letter-spacing: 2px;

    color: #00ffcc;

    text-shadow: 0 0 10px black;

    display: none;

    z-index: 999;

    opacity: 0.9;

}

.result {

    margin-top:10px;

    color:white;

}

</style>

</head>

<body>

<div class="top-controls">

    <button onclick="startTraining()">Start 30s</button>

    <button onclick="toggleMode()">Mode: <span id="modeText">All 64</span></button>

    <button onclick="toggleOrientation()">View: <span id="viewText">White</span></button>

    <button onclick="resetBoard()">Reset</button>

</div>

<div class="board" id="board"></div>

<div class="controls-bottom">

    <div id="stats">

        Session [0/0] | Best [0]

    </div>

</div>

<div class="result" id="result"></div>

<div class="flash" id="flash"></div>

<script>

const board = document.getElementById("board");

const flash = document.getElementById("flash");

const stats = document.getElementById("stats");

const modeText = document.getElementById("modeText");

const viewText = document.getElementById("viewText");

const result = document.getElementById("result");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1];

let orientation = "white";

let selected = JSON.parse(localStorage.getItem("selected") || "[]");

let bestScore = parseInt(localStorage.getItem("bestScore") || "0");

let sessionCorrect = 0;

let sessionAttempts = 0;

const max = 16;

let training = false;

let pool = [];

let currentTarget = null;

let timer = null;

let timeLeft = 30;

let mode = "all";

let squareMap = {};

/* BUILD BOARD */

function buildBoard() {

    board.innerHTML = "";

    squareMap = {};

    const fileOrder = (orientation === "white") ? files : [...files].reverse();

    const rankOrder = (orientation === "white") ? ranks : [...ranks].reverse();

    for (let r = 0; r < 8; r++) {

        for (let f = 0; f < 8; f++) {

            const file = fileOrder[f];

            const rank = rankOrder[r];

            const coord = file + rank;

            const square = document.createElement("div");

            square.className = "square";

            if ((r + f) % 2 === 0) square.classList.add("light");

            else square.classList.add("dark");

            square.textContent = coord;

            squareMap[coord] = square;

            if (selected.includes(coord)) {

                square.classList.add("selected");

            }

            square.addEventListener("click", () => handleClick(coord));

            board.appendChild(square);

        }

    }

}

/* CLICK */

function handleClick(coord) {

    if (!training) {

        if (mode === "selected") {

            if (selected.includes(coord)) {

                selected = selected.filter(s => s !== coord);

                squareMap[coord].classList.remove("selected");

            } else {

                if (selected.length < max) {

                    selected.push(coord);

                    squareMap[coord].classList.add("selected");

                }

            }

            localStorage.setItem("selected", JSON.stringify(selected));

        }

        return;

    }

    sessionAttempts++;

    if (coord === currentTarget) {

        sessionCorrect++;

        if (sessionCorrect > bestScore) {

            bestScore = sessionCorrect;

            localStorage.setItem("bestScore", bestScore);

        }

    }

    updateStats();

    nextPrompt();

}

/* ORIENTATION */

function toggleOrientation() {

    orientation = (orientation === "white") ? "black" : "white";

    viewText.textContent = orientation === "white" ? "White" : "Black";

    buildBoard();

}

/* MODE */

function toggleMode() {

    mode = (mode === "all") ? "selected" : "all";

    modeText.textContent = mode === "all" ? "All 64" : "Selected";

}

/* START */

function startTraining() {

    training = true;

    sessionCorrect = 0;

    sessionAttempts = 0;

    timeLeft = 30;

    result.textContent = "";

    pool = (mode === "all")

        ? Object.keys(squareMap)

        : [...selected];

    if (pool.length === 0) return;

    nextPrompt();

    timer = setInterval(() => {

        timeLeft--;

        if (timeLeft <= 0) endTraining();

    }, 1000);

}

/* PROMPT */

function nextPrompt() {

    currentTarget = pool[Math.floor(Math.random() * pool.length)];

    flash.textContent = currentTarget;

    flash.style.display = "block";

    setTimeout(() => {

        flash.style.display = "none";

    }, 800);

}

/* END */

function endTraining() {

    clearInterval(timer);

    training = false;

    flash.style.display = "none";

    result.textContent =

        `Session ${sessionCorrect}/${sessionAttempts}`;

}

/* STATS */

function updateStats() {

    stats.textContent =

        `Session [${sessionCorrect}/${sessionAttempts}] | Best [${bestScore}]`;

}

/* RESET */

function resetBoard() {

    localStorage.removeItem("selected");

    localStorage.removeItem("bestScore");

    location.reload();

}

buildBoard();

updateStats();

</script>

</body>

</html>
