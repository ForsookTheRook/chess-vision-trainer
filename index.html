<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin:0;

    background:#111;

    display:flex;

    flex-direction:column;

    align-items:center;

    font-family: -apple-system, sans-serif;

}

.board {

    display:grid;

    grid-template-columns: repeat(8, 40px);

    grid-template-rows: repeat(8, 40px);

    margin-top:20px;

}

.square {

    width:40px;

    height:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:10px;

    user-select:none;

}

.light { background:#f0d9b5; }

.dark { background:#b58863; }

.selected {

    box-shadow: inset 0 0 0 3px #00e5ff;

}

.controls {

    margin-top:15px;

    color:white;

    font-size:14px;

}

button {

    margin-left:10px;

    padding:6px 10px;

    border-radius:6px;

    border:none;

    background:#2c2c2e;

    color:white;

}

.flash {

    position: fixed;

    top: 40%;

    left: 50%;

    transform: translate(-50%, -50%);

    font-size: 100px;

    font-weight: 800;

    color: #00ffcc;

    text-shadow: 0 0 20px black;

    display: none;

    z-index: 999;

}

.result {

    margin-top:10px;

    color:white;

}

</style>

</head>

<body>

<div class="board" id="board"></div>

<div class="controls">

    <button onclick="startTraining()">Start 30s</button>

    <button onclick="toggleMode()">Mode: <span id="modeText">Selected</span></button>

    <button onclick="resetBoard()">Reset</button>

    <span id="counter">0 / 16</span>

</div>

<div class="result" id="result"></div>

<div class="flash" id="flash"></div>

<script>

const board = document.getElementById("board");

const flash = document.getElementById("flash");

const counter = document.getElementById("counter");

const result = document.getElementById("result");

const modeText = document.getElementById("modeText");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1];

let selected = JSON.parse(localStorage.getItem("selected") || "[]");

const max = 16;

let training = false;

let pool = [];

let currentTarget = null;

let score = 0;

let timeLeft = 30;

let timer = null;

/* MODE: selected vs full board */

let mode = "selected"; // or "all"

const squareMap = {};

/* build board */

for (let r = 0; r < 8; r++) {

    for (let f = 0; f < 8; f++) {

        const square = document.createElement("div");

        const coord = files[f] + ranks[r];

        square.className = "square";

        if ((r + f) % 2 === 0) square.classList.add("light");

        else square.classList.add("dark");

        square.textContent = coord;

        squareMap[coord] = square;

        if (selected.includes(coord)) {

            square.classList.add("selected");

        }

        square.addEventListener("click", () => handleClick(coord));

        board.appendChild(square);

    }

}

/* selection + training */

function handleClick(coord) {

    if (!training) {

        if (mode === "selected") {

            if (selected.includes(coord)) {

                selected = selected.filter(s => s !== coord);

                squareMap[coord].classList.remove("selected");

            } else {

                if (selected.length < max) {

                    selected.push(coord);

                    squareMap[coord].classList.add("selected");

                }

            }

            localStorage.setItem("selected", JSON.stringify(selected));

            updateCounter();

        }

        return;

    }

    if (coord === currentTarget) {

        score++;

    }

    nextPrompt();

}

/* MODE SWITCH */

function toggleMode() {

    mode = (mode === "selected") ? "all" : "selected";

    modeText.textContent = mode === "selected" ? "Selected" : "All 64";

}

/* START */

function startTraining() {

    training = true;

    score = 0;

    timeLeft = 30;

    result.textContent = "";

    pool = (mode === "all")

        ? Object.keys(squareMap)

        : [...selected];

    if (pool.length === 0) return;

    nextPrompt();

    timer = setInterval(() => {

        timeLeft--;

        if (timeLeft <= 0) endTraining();

    }, 1000);

}

/* PROMPT */

function nextPrompt() {

    currentTarget = pool[Math.floor(Math.random() * pool.length)];

    flash.textContent = currentTarget;

    flash.style.display = "block";

    setTimeout(() => {

        flash.style.display = "none";

    }, 800);

}

/* END */

function endTraining() {

    clearInterval(timer);

    training = false;

    flash.style.display = "none";

    result.textContent =

        `Time up — Score: ${score}`;

}

/* RESET */

function resetBoard() {

    localStorage.removeItem("selected");

    location.reload();

}

function updateCounter() {

    counter.textContent = `${selected.length} / 16`;

}

updateCounter();

</script>

</body>

</html>
