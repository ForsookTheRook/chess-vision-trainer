<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin: 0;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background: #0c0c0e;

    color: white;

    display: flex;

    flex-direction: column;

    align-items: center;

}

.header {

    padding: 10px;

    font-size: 18px;

    font-weight: 600;

}

.board-wrapper {

    width: 95vw;

    max-width: 420px;

}

.board {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    aspect-ratio: 1;

    border-radius: 12px;

    overflow: hidden;

}

.square {

    display: flex;

    justify-content: center;

    align-items: center;

    font-size: 11px;

    user-select: none;

}

.light { background: #f0d9b5; color: black; }

.dark  { background: #b58863; color: black; }

.selected {

    box-shadow: inset 0 0 0 4px #00e5ff;

}

.suggestion {

    position: fixed;

    top: 40%;

    left: 50%;

    transform: translate(-50%, -50%);

    font-size: 96px;

    font-weight: 800;

    color: #00ffcc;

    text-shadow: 0 0 20px black;

    display: none;

    z-index: 999;

}

.controls {

    position: fixed;

    bottom: 0;

    width: 100%;

    max-width: 420px;

    background: #1c1c1e;

    padding: 10px;

    display: flex;

    justify-content: space-between;

}

button {

    background: #2c2c2e;

    border: none;

    color: white;

    padding: 8px 10px;

    border-radius: 8px;

    font-size: 13px;

}

.counter {

    width: 100%;

    text-align: center;

}

.files {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    font-size: 12px;

    text-align: center;

    color: #aaa;

    margin-top: 4px;

}

</style>

</head>

<body>

<div class="header">Chess Vision Trainer</div>

<div class="board-wrapper">

    <div class="board" id="board"></div>

</div>

<div class="files" id="files"></div>

<div class="suggestion" id="suggestion"></div>

<div class="controls">

    <div class="counter" id="counter">0 / 8</div>

    <button onclick="resetBoard()">Reset</button>

</div>

<script>

const board = document.getElementById("board");

const suggestion = document.getElementById("suggestion");

const counter = document.getElementById("counter");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1];

let selected = JSON.parse(localStorage.getItem("selected") || "[]");

const max = 8;

/* render file labels */

document.getElementById("files").innerHTML =

    files.map(f => `<div>${f}</div>`).join("");

/* BUILD BOARD (SAFE VERSION) */

for (let r = 0; r < 8; r++) {

    for (let f = 0; f < 8; f++) {

        const square = document.createElement("div");

        const coord = files[f] + ranks[r];

        square.classList.add("square");

        if ((r + f) % 2 === 0) square.classList.add("light");

        else square.classList.add("dark");

        square.textContent = coord;

        if (selected.includes(coord)) {

            square.classList.add("selected");

        }

        square.addEventListener("click", () => handleClick(square, coord));

        board.appendChild(square);

    }

});

function handleClick(square, coord) {

    if (selected.includes(coord)) {

        selected = selected.filter(s => s !== coord);

        square.classList.remove("selected");

    } else {

        if (selected.length < max) {

            selected.push(coord);

            square.classList.add("selected");

        }

    }

    localStorage.setItem("selected", JSON.stringify(selected));

    updateCounter();

    // ONLY trigger suggestion after 8 selected

    if (selected.length === 8) {

        suggest();

    }

}

function suggest() {

    const pick = selected[Math.floor(Math.random() * selected.length)];

    suggestion.textContent = pick;

    suggestion.style.display = "block";

    setTimeout(() => {

        suggestion.style.display = "none";

    }, 1000);

}

function resetBoard() {

    localStorage.removeItem("selected");

    location.reload();

}

function updateCounter() {

    counter.textContent = `${selected.length} / 8`;

}

updateCounter();

</script>

</body>

</html>
