<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Chess Board Trainer</title>

<style>

  body {

    display: flex;

    flex-direction: column;

    align-items: center;

    font-family: Arial, sans-serif;

  }

  #controls {

    margin-bottom: 10px;

  }

  #board {

    display: grid;

    grid-template-columns: repeat(8, 60px);

    grid-template-rows: repeat(8, 60px);

    position: relative;

  }

  .square {

    width: 60px;

    height: 60px;

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: 14px;

    position: relative;

  }

  .light { background: #f0d9b5; }

  .dark { background: #b58863; }

  /* Suggested square */

  .target {

    outline: 3px solid red;

  }

  /* Coordinate styles */

  .coord-file {

    position: absolute;

    bottom: 2px;

    right: 4px;

    font-size: 10px;

    opacity: 0.8;

  }

  .coord-rank {

    position: absolute;

    top: 2px;

    left: 4px;

    font-size: 10px;

    opacity: 0.8;

  }

  .hidden {

    display: none;

  }

</style>

</head>

<body>

<div id="controls">

  <button onclick="toggleCoords()">Show Coordinates</button>

</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

let showCoords = false;

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1];

function createBoard() {

  board.innerHTML = "";

  for (let r = 0; r < 8; r++) {

    for (let f = 0; f < 8; f++) {

      const square = document.createElement("div");

      square.classList.add("square");

      // Color

      if ((r + f) % 2 === 0) {

        square.classList.add("light");

      } else {

        square.classList.add("dark");

      }

      // Coordinates

      const file = files[f];

      const rank = ranks[r];

      // File label (bottom row only)

      if (r === 7) {

        const fileLabel = document.createElement("div");

        fileLabel.textContent = file;

        fileLabel.classList.add("coord-file");

        if (!showCoords) fileLabel.classList.add("hidden");

        square.appendChild(fileLabel);

      }

      // Rank label (left column only)

      if (f === 0) {

        const rankLabel = document.createElement("div");

        rankLabel.textContent = rank;

        rankLabel.classList.add("coord-rank");

        if (!showCoords) rankLabel.classList.add("hidden");

        square.appendChild(rankLabel);

      }

      board.appendChild(square);

    }

  }

}

function toggleCoords() {

  showCoords = !showCoords;

  // Update button text

  const btn = document.querySelector("button");

  btn.textContent = showCoords ? "Hide Coordinates" : "Show Coordinates";

  createBoard();

}

// Initial render

createBoard();

</script>

</body>

</html>
