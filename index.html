<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Chess Vision Trainer</title>

<style>

:root {

  --bg: #0f172a;

  --panel: #111827;

  --accent: #22c55e;

  --accent-red: #ef4444;

  --text: #e5e7eb;

  --muted: #9ca3af;

  --border: #1f2937;

}

body {

  background: linear-gradient(180deg, #020617, #0f172a);

  color: var(--text);

  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  margin: 0;

  padding: 20px;

  text-align: center;

}

.app-container {

  max-width: 520px;

  margin: auto;

  background: var(--panel);

  border-radius: 16px;

  padding: 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);

  border: 1px solid var(--border);

}

.title {

  margin: 0;

  font-size: 24px;

}

.subtitle {

  margin: 4px 0 16px;

  color: var(--muted);

  font-size: 14px;

}

.controls {

  margin-bottom: 10px;

}

button {

  background: #1f2937;

  color: var(--text);

  border: 1px solid var(--border);

  padding: 10px 14px;

  margin: 6px;

  border-radius: 8px;

  cursor: pointer;

  font-weight: 500;

  transition: all 0.15s ease;

}

button:hover {

  background: #374151;

}

button.active {

  background: var(--accent);

  color: #022c22;

}

.mode-pill {

  display: inline-block;

  padding: 6px 12px;

  border-radius: 999px;

  background: #020617;

  border: 1px solid var(--border);

  font-size: 13px;

  margin-bottom: 10px;

}

.board {

  display: grid;

  grid-template-columns: repeat(8, 1fr);

  width: 100%;

  aspect-ratio: 1;

  border-radius: 10px;

  overflow: hidden;

  margin: 10px 0;

}

.square {

  display: flex;

  align-items: center;

  justify-content: center;

  font-size: 18px;

  cursor: pointer;

  transition: all 0.15s ease;

}

.square:hover {

  transform: scale(1.05);

  z-index: 2;

}

.square.clicked {

  animation: clickFlash 0.2s ease;

}

@keyframes clickFlash {

  0% { filter: brightness(1.5); }

  100% { filter: brightness(1); }

}

.light { background: #f0d9b5; }

.dark { background: #b58863; }

.feedback {

  font-size: 28px;

  margin: 12px 0;

  min-height: 32px;

  font-weight: 600;

}

.correct { color: var(--accent); }

.incorrect { color: var(--accent-red); }

.score {

  display: flex;

  justify-content: space-between;

  background: #020617;

  padding: 10px;

  border-radius: 8px;

  margin-top: 12px;

  border: 1px solid var(--border);

  font-size: 14px;

}

</style>

</head>

<body>

<div class="app-container">

  <h1 class="title">Chess Vision Trainer</h1>

  <p class="subtitle">Board awareness & square recognition</p>

  <div class="controls">

    <button id="mode4">4 Squares</button>

    <button id="mode64" class="active">64 Squares</button>

  </div>

  <div class="mode-pill" id="modeLabel">Mode: 64 Squares</div>

  <div class="board" id="board"></div>

  <div class="feedback" id="feedback"></div>

  <div class="score">

    <div>Correct: <span id="correct">0</span></div>

    <div>Attempts: <span id="attempts">0</span></div>

  </div>

  <button id="nextBtn">Next Square</button>

</div>

<script>

const board = document.getElementById("board");

const feedback = document.getElementById("feedback");

const correctEl = document.getElementById("correct");

const attemptsEl = document.getElementById("attempts");

const modeLabel = document.getElementById("modeLabel");

let targetSquare = "";

let correct = 0;

let attempts = 0;

let mode = 64;

function createBoard() {

  board.innerHTML = "";

  const files = "abcdefgh";

  for (let r = 8; r >= 1; r--) {

    for (let f = 0; f < 8; f++) {

      const square = document.createElement("div");

      square.classList.add("square");

      square.classList.add((r + f) % 2 === 0 ? "light" : "dark");

      const name = files[f] + r;

      square.dataset.square = name;

      square.addEventListener("click", () => handleClick(square));

      board.appendChild(square);

    }

  }

}

function getRandomSquare() {

  const files = "abcdefgh";

  if (mode === 64) {

    return files[Math.floor(Math.random() * 8)] + (Math.floor(Math.random() * 8) + 1);

  } else {

    const choices = ["d4","d5","e4","e5"];

    return choices[Math.floor(Math.random() * 4)];

  }

}

function nextSquare() {

  targetSquare = getRandomSquare();

  feedback.textContent = targetSquare;

  feedback.className = "feedback";

}

function handleClick(square) {

  attempts++;

  attemptsEl.textContent = attempts;

  square.classList.add("clicked");

  setTimeout(() => square.classList.remove("clicked"), 200);

  if (square.dataset.square === targetSquare) {

    correct++;

    correctEl.textContent = correct;

    feedback.textContent = "✔ Correct";

    feedback.className = "feedback correct";

  } else {

    feedback.textContent = "✖ Incorrect";

    feedback.className = "feedback incorrect";

  }

}

function setMode(newMode) {

  mode = newMode;

  document.getElementById("mode4").classList.remove("active");

  document.getElementById("mode64").classList.remove("active");

  if (mode === 4) {

    document.getElementById("mode4").classList.add("active");

    modeLabel.textContent = "Mode: 4 Squares";

  } else {

    document.getElementById("mode64").classList.add("active");

    modeLabel.textContent = "Mode: 64 Squares";

  }

  // reset session on mode change

  correct = 0;

  attempts = 0;

  correctEl.textContent = 0;

  attemptsEl.textContent = 0;

  feedback.textContent = "";

  nextSquare();

}

document.getElementById("nextBtn").onclick = nextSquare;

document.getElementById("mode4").onclick = () => setMode(4);

document.getElementById("mode64").onclick = () => setMode(64);

createBoard();

nextSquare();

</script>

</body>

</html>
