<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin: 0;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background: #0c0c0e;

    color: white;

    display: flex;

    flex-direction: column;

    align-items: center;

}

.header {

    padding: 12px;

    font-weight: 600;

    font-size: 18px;

}

.board-wrapper {

    position: relative;

    width: 95vw;

    max-width: 420px;

}

.board {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    aspect-ratio: 1;

    border-radius: 12px;

    overflow: hidden;

}

.square {

    display: flex;

    justify-content: center;

    align-items: center;

    font-size: 11px;

    user-select: none;

}

.light { background: #f0d9b5; color: black; }

.dark  { background: #b58863; color: black; }

.selected {

    outline: 3px solid #00e5ff;

    background: #7df9ff !important;

}

.target {

    box-shadow: inset 0 0 0 4px red;

}

.correct {

    background: #00cc66 !important;

}

.wrong {

    background: #ff4d4d !important;

}

.file-labels {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    font-size: 12px;

    margin-top: 4px;

    text-align: center;

    color: #aaa;

}

.rank-labels {

    position: absolute;

    left: -16px;

    top: 0;

    height: 100%;

    display: grid;

    grid-template-rows: repeat(8, 1fr);

    font-size: 12px;

    color: #aaa;

}

.controls {

    position: fixed;

    bottom: 0;

    width: 100%;

    max-width: 420px;

    background: #1c1c1e;

    padding: 10px;

    display: flex;

    flex-wrap: wrap;

    gap: 6px;

    justify-content: space-between;

}

button {

    background: #2c2c2e;

    border: none;

    color: white;

    padding: 8px 10px;

    border-radius: 8px;

    font-size: 13px;

}

.counter {

    width: 100%;

    text-align: center;

    font-size: 14px;

}

</style>

</head>

<body>

<div class="header">Chess Vision Trainer</div>

<div class="board-wrapper">

    <div class="rank-labels" id="ranks"></div>

    <div class="board" id="board"></div>

</div>

<div class="file-labels" id="files"></div>

<div class="controls">

    <div class="counter" id="counter">0 / 8</div>

    <button onclick="resetBoard()">Reset</button>

    <button onclick="startTraining(false)">Train All</button>

    <button onclick="startTraining(true)">Train Selected</button>

    <button onclick="stopTraining()">Stop</button>

</div>

<script>

const board = document.getElementById("board");

const counter = document.getElementById("counter");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1];

let selected = JSON.parse(localStorage.getItem("selectedSquares") || "[]");

let training = false;

let target = null;

const max = 8;

/* Labels */

document.getElementById("files").innerHTML =

    files.map(f => `<div>${f}</div>`).join("");

document.getElementById("ranks").innerHTML =

    ranks.map(r => `<div>${r}</div>`).join("");

/* Build board */

files.forEach((file, colIndex) => {

    ranks.forEach((rank, rowIndex) => {

        const square = document.createElement("div");

        const coord = file + rank;

        square.classList.add("square");

        if ((rowIndex + colIndex) % 2 === 0) {

            square.classList.add("light");

        } else {

            square.classList.add("dark");

        }

        square.textContent = coord;

        if (selected.includes(coord)) {

            square.classList.add("selected");

        }

        square.addEventListener("click", () => handleClick(square, coord));

        board.appendChild(square);

    });

});

/* Click behavior */

function handleClick(square, coord) {

    if (training) {

        if (coord === target) {

            square.classList.add("correct");

            setTimeout(nextTarget, 400);

        } else {

            square.classList.add("wrong");

        }

        return;

    }

    if (square.classList.contains("selected")) {

        square.classList.remove("selected");

        selected = selected.filter(s => s !== coord);

    } else {

        if (selected.length >= max) return;

        square.classList.add("selected");

        selected.push(coord);

    }

    localStorage.setItem("selectedSquares", JSON.stringify(selected));

    updateCounter();

}

/* Training */

let trainingPool = [];

function startTraining(selectedOnly) {

    training = true;

    trainingPool = selectedOnly && selected.length

        ? [...selected]

        : files.flatMap(f => ranks.map(r => f + r));

    nextTarget();

}

function nextTarget() {

    clearMarks();

    target = trainingPool[Math.floor(Math.random() * trainingPool.length)];

    document.querySelectorAll(".square").forEach(sq => {

        if (sq.textContent === target) {

            sq.classList.add("target");

        }

    });

}

function stopTraining() {

    training = false;

    clearMarks();

}

function clearMarks() {

    document.querySelectorAll(".square").forEach(sq => {

        sq.classList.remove("target", "correct", "wrong");

    });

}

/* Other */

function updateCounter() {

    counter.textContent = `${selected.length} / 8`;

}

function resetBoard() {

    localStorage.removeItem("selectedSquares");

    location.reload();

}

updateCounter();

</script>

</body>

</html>
