<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin: 0;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background: #0c0c0e;

    color: white;

    display: flex;

    flex-direction: column;

    align-items: center;

}

/* Header */

.header {

    padding: 10px;

    font-size: 18px;

    font-weight: 600;

}

/* Board wrapper */

.board-wrapper {

    position: relative;

    width: 95vw;

    max-width: 420px;

}

/* Board */

.board {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    aspect-ratio: 1;

    border-radius: 12px;

    overflow: hidden;

}

/* Squares */

.square {

    display: flex;

    justify-content: center;

    align-items: center;

    font-size: 11px;

    user-select: none;

    position: relative;

}

.light { background: #f0d9b5; color: black; }

.dark  { background: #b58863; color: black; }

.selected {

    outline: 3px solid #00e5ff;

    background: #7df9ff !important;

}

/* Labels */

.files {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    text-align: center;

    font-size: 12px;

    color: #aaa;

    margin-top: 4px;

}

.ranks {

    position: absolute;

    left: -18px;

    top: 0;

    height: 100%;

    display: grid;

    grid-template-rows: repeat(8, 1fr);

    font-size: 12px;

    color: #aaa;

}

/* Suggestion overlay */

.suggestion {

    position: fixed;

    top: 40%;

    left: 50%;

    transform: translate(-50%, -50%);

    font-size: 80px;

    font-weight: 700;

    color: #00ffcc;

    text-shadow: 0 0 20px black;

    display: none;

    z-index: 999;

}

/* Controls */

.controls {

    position: fixed;

    bottom: 0;

    width: 100%;

    max-width: 420px;

    background: #1c1c1e;

    padding: 10px;

    display: flex;

    justify-content: space-between;

    gap: 6px;

}

button {

    background: #2c2c2e;

    border: none;

    color: white;

    padding: 8px 10px;

    border-radius: 8px;

    font-size: 13px;

}

.counter {

    width: 100%;

    text-align: center;

    font-size: 14px;

}

</style>

</head>

<body>

<div class="header">Chess Vision Trainer</div>

<div class="board-wrapper">

    <div class="ranks" id="ranks"></div>

    <div class="board" id="board"></div>

</div>

<div class="files" id="files"></div>

<div class="suggestion" id="suggestion"></div>

<div class="controls">

    <div class="counter" id="counter">0 / 8</div>

    <button onclick="resetBoard()">Reset</button>

    <button onclick="suggest()">Suggest</button>

</div>

<script>

const board = document.getElementById("board");

const counter = document.getElementById("counter");

const suggestion = document.getElementById("suggestion");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [8,7,6,5,4,3,2,1]; // correct chess orientation

let selected = JSON.parse(localStorage.getItem("selected") || "[]");

const max = 8;

/* Labels */

document.getElementById("files").innerHTML =

    files.map(f => `<div>${f}</div>`).join("");

document.getElementById("ranks").innerHTML =

    ranks.map(r => `<div>${r}</div>`).join("");

/* Build board */

files.forEach((file, col) => {

    ranks.forEach((rank, row) => {

        const square = document.createElement("div");

        const coord = file + rank;

        square.classList.add("square");

        if ((row + col) % 2 === 0) square.classList.add("light");

        else square.classList.add("dark");

        square.textContent = coord;

        if (selected.includes(coord)) {

            square.classList.add("selected");

        }

        square.addEventListener("click", () => {

            if (square.classList.contains("selected")) {

                square.classList.remove("selected");

                selected = selected.filter(s => s !== coord);

            } else {

                if (selected.length >= max) return;

                square.classList.add("selected");

                selected.push(coord);

            }

            localStorage.setItem("selected", JSON.stringify(selected));

            updateCounter();

        });

        board.appendChild(square);

    });

});

/* Suggest ONE of selected squares */

function suggest() {

    if (selected.length === 0) return;

    const pick = selected[Math.floor(Math.random() * selected.length)];

    suggestion.textContent = pick;

    suggestion.style.display = "block";

    setTimeout(() => {

        suggestion.style.display = "none";

    }, 1000);

}

/* Reset */

function resetBoard() {

    localStorage.removeItem("selected");

    location.reload();

}

function updateCounter() {

    counter.textContent = `${selected.length} / 8`;

}

updateCounter();

</script>

</body>

</html>
