<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Vision Trainer</title>

<style>

body {

    margin: 0;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;

    background: #0c0c0e;

    color: white;

    display: flex;

    flex-direction: column;

    align-items: center;

}

.header {

    padding: 10px;

    font-size: 18px;

    font-weight: 600;

}

.board-wrapper {

    position: relative;

    width: 95vw;

    max-width: 420px;

}

/* IMPORTANT: grid fills row-major but we control coordinate mapping */

.board {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    aspect-ratio: 1;

    border-radius: 12px;

    overflow: hidden;

}

.square {

    display: flex;

    justify-content: center;

    align-items: center;

    font-size: 11px;

    user-select: none;

}

/* clean full-square highlight fix */

.light { background: #f0d9b5; color: black; }

.dark  { background: #b58863; color: black; }

.selected {

    box-shadow: inset 0 0 0 4px #00e5ff;

}

/* big suggestion overlay */

.suggestion {

    position: fixed;

    top: 40%;

    left: 50%;

    transform: translate(-50%, -50%);

    font-size: 96px;

    font-weight: 800;

    color: #00ffcc;

    text-shadow: 0 0 20px black;

    display: none;

    z-index: 999;

}

/* labels */

.files {

    display: grid;

    grid-template-columns: repeat(8, 1fr);

    font-size: 12px;

    text-align: center;

    color: #aaa;

    margin-top: 4px;

}

.ranks {

    position: absolute;

    left: -18px;

    top: 0;

    height: 100%;

    display: grid;

    grid-template-rows: repeat(8, 1fr);

    font-size: 12px;

    color: #aaa;

}

/* controls */

.controls {

    position: fixed;

    bottom: 0;

    width: 100%;

    max-width: 420px;

    background: #1c1c1e;

    padding: 10px;

    display: flex;

    justify-content: space-between;

}

button {

    background: #2c2c2e;

    border: none;

    color: white;

    padding: 8px 10px;

    border-radius: 8px;

    font-size: 13px;

}

.counter {

    width: 100%;

    text-align: center;

}

</style>

</head>

<body>

<div class="header">Chess Vision Trainer</div>

<div class="board-wrapper">

    <div class="ranks" id="ranks"></div>

    <div class="board" id="board"></div>

</div>

<div class="files" id="files"></div>

<div class="suggestion" id="suggestion"></div>

<div class="controls">

    <div class="counter" id="counter">0 / 8</div>

    <button onclick="resetBoard()">Reset</button>

</div>

<script>

const board = document.getElementById("board");

const suggestion = document.getElementById("suggestion");

const counter = document.getElementById("counter");

const files = ["a","b","c","d","e","f","g","h"];

const ranks = [1,2,3,4,5,6,7,8]; // IMPORTANT: build bottom-up logically

let selected = JSON.parse(localStorage.getItem("selected") || "[]");

const max = 8;

let trainingActive = false;

/* labels */

document.getElementById("files").innerHTML =

    files.map(f => `<div>${f}</div>`).join("");

document.getElementById("ranks").innerHTML =

    [...ranks].reverse().map(r => `<div>${r}</div>`).join("");

/*

CORE FIX:

We build board so a8 is top-left, a1 bottom-left.

We invert rank visually but keep correct chess mapping.

*/

for (let r = 8; r >= 1; r--) {

    for (let f = 0; f < 8; f++) {

        const file = files[f];

        const coord = file + r;

        const square = document.createElement("div");

        square.classList.add("square");

        const row = 8 - r; // ensures correct checker pattern

        const col = f;

        if ((row + col) % 2 === 0) square.classList.add("light");

        else square.classList.add("dark");

        square.textContent = coord;

        if (selected.includes(coord)) {

            square.classList.add("selected");

        }

        square.addEventListener("click", () => handleClick(square, coord));

        board.appendChild(square);

    }

});

/* click logic */

function handleClick(square, coord) {

    // selection mode first

    if (!trainingActive) {

        if (!selected.includes(coord)) {

            if (selected.length < max) {

                selected.push(coord);

                square.classList.add("selected");

            }

        } else {

            selected = selected.filter(s => s !== coord);

            square.classList.remove("selected");

        }

        localStorage.setItem("selected", JSON.stringify(selected));

        updateCounter();

        // ONLY start training when 8 are selected

        if (selected.length === 8) {

            trainingActive = true;

            nextSuggestion();

        }

        return;

    }

    // training mode (ignore selection changes)

}

/* suggestion system */

function nextSuggestion() {

    if (selected.length !== 8) return;

    const pick = selected[Math.floor(Math.random() * selected.length)];

    suggestion.textContent = pick;

    suggestion.style.display = "block";

    setTimeout(() => {

        suggestion.style.display = "none";

    }, 1000);

}

/* reset */

function resetBoard() {

    localStorage.removeItem("selected");

    location.reload();

}

function updateCounter() {

    counter.textContent = `${selected.length} / 8`;

}

updateCounter();

</script>

</body>

</html>
