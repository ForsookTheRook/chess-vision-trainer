<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>64 Square Vision Board</title>

<style>

  body {

    font-family: system-ui, -apple-system, sans-serif;

    display: flex;

    flex-direction: column;

    align-items: center;

    margin: 20px;

    font-size: 1.3em; /* ~30% increase */

  }

  #controls {

    margin-bottom: 10px;

    display: flex;

    gap: 10px;

    align-items: center;

  }

  button {

    padding: 8px 12px;

    font-size: 1em;

    cursor: pointer;

  }

  #score {

    margin: 10px 0;

  }

  #board {

    display: grid;

    grid-template-columns: repeat(8, 60px);

    grid-template-rows: repeat(8, 60px);

    position: relative;

    border: 2px solid #333;

  }

  .square {

    width: 60px;

    height: 60px;

    display: flex;

    align-items: center;

    justify-content: center;

    user-select: none;

  }

  .light { background: #eee; }

  .dark { background: #777; }

  /* Suggested square overlay (centered) */

  .suggested-square {

    position: absolute;

    width: 40px;

    height: 40px;

    border: 2px solid red;

    box-sizing: border-box;

    pointer-events: none;

    /* centered on board */

    top: 50%;

    left: 50%;

    transform: translate(-50%, -50%);

    opacity: 0.85;

  }

  .hit {

    outline: 3px solid green;

  }

</style>

</head>

<body>

<div id="controls">

  <label>

    Mode:

    <select id="mode">

      <option value="practice">Practice</option>

      <option value="timed">Timed</option>

    </select>

  </label>

  <button onclick="reset()">Reset</button>

</div>

<div id="score">

  Attempts: <span id="attempts">0</span> |

  Correct: <span id="correct">0</span>

</div>

<div id="board"></div>

<script>

const board = document.getElementById("board");

const attemptsEl = document.getElementById("attempts");

const correctEl = document.getElementById("correct");

let attempts = 0;

let correct = 0;

// Build board

const squares = [];

for (let r = 0; r < 8; r++) {

  for (let c = 0; c < 8; c++) {

    const sq = document.createElement("div");

    sq.className = "square " + ((r + c) % 2 === 0 ? "light" : "dark");

    sq.dataset.r = r;

    sq.dataset.c = c;

    sq.addEventListener("click", () => handleClick(r, c, sq));

    board.appendChild(sq);

    squares.push(sq);

  }

}

// Suggested square (fixed center)

const suggested = document.createElement("div");

suggested.className = "suggested-square";

board.appendChild(suggested);

const center = { r: 3, c: 3 };

function handleClick(r, c, el) {

  attempts++;

  attemptsEl.textContent = attempts;

  const isCorrect = (r === center.r && c === center.c);

  if (isCorrect) {

    correct++;

    correctEl.textContent = correct;

    el.classList.add("hit");

    setTimeout(() => el.classList.remove("hit"), 400);

  }

}

function reset() {

  attempts = 0;

  correct = 0;

  attemptsEl.textContent = "0";

  correctEl.textContent = "0";

}

</script>

</body>

</html>
