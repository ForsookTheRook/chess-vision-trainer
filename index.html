<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Coordinate Trainer</title>

<style>

  body {

    font-family: Arial, sans-serif;

    display: flex;

    flex-direction: column;

    align-items: center;

    margin: 0;

  }

  .controls {

    margin: 12px;

    display: flex;

    gap: 10px;

    flex-wrap: wrap;

    justify-content: center;

  }

  button {

    padding: 8px 12px;

    font-size: 14px;

    cursor: pointer;

    border-radius: 6px;

    border: 1px solid #ccc;

    background: #f5f5f5;

  }

  button:hover {

    background: #e6e6e6;

  }

  .board {

    display: grid;

    grid-template-columns: repeat(8, 50px);

    grid-template-rows: repeat(8, 50px);

    border: 2px solid #333;

  }

  .square {

    width: 50px;

    height: 50px;

    display: flex;

    align-items: center;

    justify-content: center;

    font-size: 12px;

    user-select: none;

  }

  .light { background-color: #f0d9b5; }

  .dark  { background-color: #b58863; }

  .stats {

    margin-top: 10px;

    font-size: 16px;

  }

  .info-container {

    margin-top: 12px;

    width: 100%;

    display: flex;

    justify-content: center;

  }

</style>

</head>

<body>

<div class="controls">

  <button id="modeBtn">Mode: 30s</button>

  <button id="coordBtn">Toggle Coordinates</button>

</div>

<div id="board" class="board"></div>

<div class="stats">

  Correct: <span id="correct">0</span> |

  Attempts: <span id="attempts">0</span>

</div>

<div class="info-container">

  <button id="infoBtn">Info</button>

</div>

<script>

const board = document.getElementById("board");

const correctEl = document.getElementById("correct");

const attemptsEl = document.getElementById("attempts");

let showCoords = true;

let timedMode = true;

let correct = 0;

let attempts = 0;

const files = ["a","b","c","d","e","f","g","h"];

let targetSquare = "";

function createBoard() {

  board.innerHTML = "";

  for (let rank = 8; rank >= 1; rank--) {

    for (let file = 0; file < 8; file++) {

      const squareName = files[file] + rank;

      const square = document.createElement("div");

      const isLight = (rank + file) % 2 === 0;

      square.className = "square " + (isLight ? "light" : "dark");

      square.textContent = showCoords ? squareName : "";

      square.addEventListener("click", () => handleClick(squareName));

      board.appendChild(square);

    }

  }

}

function handleClick(squareName) {

  attempts++;

  if (squareName === targetSquare) {

    correct++;

  }

  updateStats();

  pickNewTarget();

}

function updateStats() {

  correctEl.textContent = correct;

  attemptsEl.textContent = attempts;

}

function pickNewTarget() {

  const file = files[Math.floor(Math.random() * 8)];

  const rank = Math.floor(Math.random() * 8) + 1;

  targetSquare = file + rank;

  document.title = "Find: " + targetSquare;

}

document.getElementById("coordBtn").addEventListener("click", () => {

  showCoords = !showCoords;

  createBoard();

});

document.getElementById("modeBtn").addEventListener("click", (e) => {

  timedMode = !timedMode;

  e.target.textContent = timedMode ? "Mode: 30s" : "Mode: Unlimited";

});

document.getElementById("infoBtn").addEventListener("click", () => {

  window.open("https://github.com/chess-vision-trainer/chess-vision-trainer#readme", "_blank");

});

createBoard();

pickNewTarget();

updateStats();

</script>

</body>

</html>
